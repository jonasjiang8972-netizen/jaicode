<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaicode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #0a0f1a; color: #e6edf3; }
        .chat-container { display: flex; flex-direction: column; height: 100vh; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; }
        .message.user { background: #1a2332; border-left: 3px solid #00B8D9; }
        .message.assistant { background: #0d1117; border-left: 3px solid #00E5C9; }
        .message.system { background: #1a1a2e; border-left: 3px solid #ffbd2e; font-size: 13px; }
        .input-area { padding: 16px; border-top: 1px solid #30363d; background: #0d1117; }
        .input-box { width: 100%; background: #1a2332; border: 1px solid #30363d; border-radius: 8px; padding: 12px; color: #e6edf3; resize: none; min-height: 44px; max-height: 200px; outline: none; }
        .input-box:focus { border-color: #00B8D9; }
        .status-bar { display: flex; justify-content: space-between; padding: 8px 16px; font-size: 12px; color: #8b949e; background: #0d1117; border-bottom: 1px solid #30363d; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-dot.connected { background: #39d353; }
        .status-dot.disconnected { background: #ff5f56; }
        .btn { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #30363d; background: #1a2332; color: #e6edf3; }
        .btn:hover { border-color: #00B8D9; }
        .btn-primary { background: #00B8D9; color: #0a0f1a; border-color: #00B8D9; }
        .sidebar { width: 260px; border-right: 1px solid #30363d; background: #0d1117; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .diff-add { color: #39d353; background: rgba(57,211,83,0.1); padding: 2px 4px; border-radius: 3px; }
        .diff-del { color: #ff5f56; background: rgba(255,95,86,0.1); padding: 2px 4px; border-radius: 3px; }
        pre { background: #1a2332; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #00B8D9; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tabs { display: flex; border-bottom: 1px solid #30363d; }
        .tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #8b949e; }
        .tab.active { color: #00B8D9; border-bottom: 2px solid #00B8D9; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
