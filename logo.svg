<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B8D9"/>
      <stop offset="50%" style="stop-color:#00E5C9"/>
      <stop offset="100%" style="stop-color:#00B8D9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B8D9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00B8D9;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00B8D9" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="24" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="60" x2="800" y2="60" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="300" stroke="#00B8D9" stroke-width="0.5"/>
  </g>

  <!-- Terminal window frame -->
  <rect x="40" y="50" width="220" height="160" rx="12" fill="#0d1117" stroke="#00B8D9" stroke-width="1.5" opacity="0.9"/>
  <!-- Window dots -->
  <circle cx="60" cy="68" r="4" fill="#ff5f56"/>
  <circle cx="76" cy="68" r="4" fill="#ffbd2e"/>
  <circle cx="92" cy="68" r="4" fill="#27c93f"/>
  <!-- Terminal content -->
  <text x="56" y="96" font-family="monospace" font-size="11" fill="#00B8D9">$ jaicode</text>
  <text x="56" y="116" font-family="monospace" font-size="11" fill="#00E5C9">→ code mode</text>
  <text x="56" y="136" font-family="monospace" font-size="10" fill="#8b949e">⠋ analyzing...</text>
  <text x="56" y="156" font-family="monospace" font-size="10" fill="#39d353">✓ fixed 3 issues</text>
  <text x="56" y="176" font-family="monospace" font-size="10" fill="#8b949e">⏱ 2.1s</text>
  <text x="56" y="196" font-family="monospace" font-size="9" fill="#00B8D9">[zh/en] 中英双语就绪</text>

  <!-- Main logo mark -->
  <g transform="translate(310, 80)">
    <!-- Brackets -->
    <text font-family="monospace" font-size="80" fill="url(#accent)" font-weight="bold" filter="url(#glow-filter)">&lt;</text>
    <!-- J letter -->
    <text x="55" y="2" font-family="monospace" font-size="90" fill="url(#accent)" font-weight="bold" filter="url(#shadow)">J</text>
    <!-- AI neural network dots -->
    <circle cx="130" cy="15" r="5" fill="#00E5C9" opacity="0.9"/>
    <circle cx="155" cy="-5" r="4" fill="#00B8D9" opacity="0.7"/>
    <circle cx="155" cy="35" r="4" fill="#00B8D9" opacity="0.7"/>
    <circle cx="180" cy="15" r="5" fill="#00E5C9" opacity="0.9"/>
    <!-- Connection lines -->
    <line x1="130" y1="15" x2="155" y2="-5" stroke="#00B8D9" stroke-width="1.5" opacity="0.6"/>
    <line x1="130" y1="15" x2="155" y2="35" stroke="#00B8D9" stroke-width="1.5" opacity="0.6"/>
    <line x1="155" y1="-5" x2="180" y2="15" stroke="#00B8D9" stroke-width="1.5" opacity="0.6"/>
    <line x1="155" y1="35" x2="180" y2="15" stroke="#00B8D9" stroke-width="1.5" opacity="0.6"/>
    <!-- Closing bracket -->
    <text x="195" y="2" font-family="monospace" font-size="80" fill="url(#accent)" font-weight="bold" filter="url(#glow-filter)">/&gt;</text>
  </g>

  <!-- Wordmark -->
  <text x="310" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" fill="url(#accent)" font-weight="600" letter-spacing="-1">Jaicode</text>

  <!-- Tagline -->
  <text x="310" y="252" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8b949e" letter-spacing="2">LOCAL-FIRST · BILINGUAL · OPEN-MODEL</text>

  <!-- Decorative accent line -->
  <line x1="310" y1="265" x2="530" y2="265" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- Corner bolt -->
  <circle cx="760" cy="40" r="12" fill="none" stroke="#00B8D9" stroke-width="1.5" opacity="0.4"/>
  <text x="753" y="45" font-family="monospace" font-size="12" fill="#00B8D9" opacity="0.4">⚡</text>
</svg>
